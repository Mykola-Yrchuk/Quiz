name: Python CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Show files
        run: ls -R

      - name: Install xvfb
        run: sudo apt-get install -y xvfb

      - name: Run tests
        env:
          PYTHONPATH: .
        run: xvfb-run pytest
